<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FerryLab — Otter Ferry Seafish</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #3b9ab5;
  --teal-dark: #2a7a93;
  --teal-light: #e8f5f9;
  --teal-mid: #7ec4d6;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --red: #A32D2D;
  --red-light: #FCEBEB;
  --blue: #185FA5;
  --blue-light: #E6F1FB;
  --surface: #f5f7f8;
  --card: #ffffff;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.15);
  --text: #1a1f1c;
  --text-muted: #6b7570;
  --text-faint: #9eaaa5;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-lg: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--surface); color: var(--text); font-size: 15px; min-height: 100vh; -webkit-font-smoothing: antialiased; }

.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { width: 34px; height: 34px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
.brand-logo img { width: 100%; height: 100%; object-fit: cover; }
.brand-name { font-size: 16px; font-weight: 500; letter-spacing: -0.02em; color: var(--text); }
.brand-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.user-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
.user-bar select { font-family: var(--font); font-size: 13px; border: 1px solid var(--border-strong); border-radius: 7px; padding: 5px 10px; background: var(--surface); color: var(--text); cursor: pointer; }

.nav { background: var(--card); border-bottom: 1px solid var(--border); display: flex; padding: 0 1.5rem; }
.nav-btn { padding: 0 18px; height: 44px; border: none; background: none; color: var(--text-muted); font-family: var(--font); font-size: 13px; font-weight: 400; cursor: pointer; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 7px; transition: color 0.15s; }
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--teal-dark); border-bottom-color: var(--teal); font-weight: 500; }
.badge { background: var(--red); color: white; font-size: 10px; font-weight: 500; border-radius: 10px; padding: 1px 6px; min-width: 18px; text-align: center; font-family: var(--mono); }
.badge.teal { background: var(--teal); }

.main { max-width: 960px; margin: 0 auto; padding: 1.25rem 1.5rem; }
.section { display: none; }
.section.active { display: block; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.card-title { font-size: 14px; font-weight: 500; color: var(--text); }

.metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1rem; }
.metric { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
.metric-val { font-size: 26px; font-weight: 300; color: var(--text); font-family: var(--mono); }
.metric-val.warn { color: var(--amber); }
.metric-val.danger { color: var(--red); }

.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.filter-pill { padding: 4px 12px; border: 1px solid var(--border-strong); border-radius: 20px; background: transparent; color: var(--text-muted); font-family: var(--font); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.filter-pill:hover { border-color: var(--teal-mid); color: var(--teal-dark); }
.filter-pill.active { background: var(--teal-light); color: var(--teal-dark); border-color: var(--teal-mid); }

.inv-table { width: 100%; border-collapse: collapse; }
.inv-table th { font-size: 11px; font-weight: 500; color: var(--text-muted); text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.04em; }
.inv-table td { font-size: 13px; padding: 11px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
.inv-table tr:last-child td { border-bottom: none; }
.inv-table tr:hover td { background: #f8fbfc; }
.item-name { font-weight: 500; font-size: 13px; }

.pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; font-family: var(--mono); }
.pill-ok { background: #EAF3DE; color: #3B6D11; }
.pill-low { background: var(--amber-light); color: var(--amber); }
.pill-critical { background: var(--red-light); color: var(--red); }

.qty-control { display: flex; align-items: center; gap: 6px; }
.qty-btn { width: 26px; height: 26px; border: 1px solid var(--border-strong); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
.qty-btn:hover { background: var(--teal-light); border-color: var(--teal-mid); }
.qty-val { font-family: var(--mono); font-size: 13px; font-weight: 500; min-width: 28px; text-align: center; }
.qty-unit { font-size: 11px; color: var(--text-faint); min-width: 30px; }

.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 7px; font-family: var(--font); font-size: 12px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; white-space: nowrap; }
.btn-outline { background: transparent; border-color: var(--border-strong); color: var(--text-muted); }
.btn-outline:hover { border-color: var(--teal-mid); color: var(--teal-dark); background: var(--teal-light); }
.btn-teal { background: var(--teal); color: white; border-color: var(--teal); }
.btn-teal:hover { background: var(--teal-dark); }
.btn-delete { width: 24px; height: 24px; border: none; background: transparent; color: var(--text-faint); font-size: 13px; cursor: pointer; border-radius: 5px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.btn-delete:hover { background: var(--red-light); color: var(--red); }
.btn-restock { background: transparent; border-color: var(--teal-mid); color: var(--teal-dark); font-size: 11px; padding: 4px 10px; }
.btn-restock:hover { background: var(--teal-light); }
.btn-restock.sent { border-color: var(--border); color: var(--text-faint); cursor: default; pointer-events: none; }
.btn-complete { background: transparent; border-color: var(--border-strong); color: var(--text-muted); font-size: 11px; padding: 4px 10px; }
.btn-complete:hover { background: var(--teal-light); border-color: var(--teal-mid); color: var(--teal-dark); }

.form-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; display: none; }
.form-panel.open { display: block; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.form-group input, .form-group select, .form-group textarea { font-family: var(--font); font-size: 13px; padding: 7px 10px; border: 1px solid var(--border-strong); border-radius: 7px; background: var(--card); color: var(--text); outline: none; transition: border-color 0.15s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--teal); }
.form-group textarea { resize: vertical; min-height: 70px; }
.form-full { grid-column: 1 / -1; }

.wo-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 0.75rem; background: var(--card); transition: border-color 0.15s; }
.wo-card:hover { border-color: var(--border-strong); }
.wo-card.completed { opacity: 0.6; }
.wo-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.wo-title { font-size: 14px; font-weight: 500; }
.wo-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.wo-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin: 8px 0; }
.wo-footer { display: flex; align-items: center; justify-content: space-between; }
.wo-tags { display: flex; gap: 6px; }

.tag { padding: 2px 9px; border-radius: 20px; font-size: 11px; font-family: var(--mono); }
.tag-high { background: var(--red-light); color: var(--red); }
.tag-medium { background: var(--amber-light); color: var(--amber); }
.tag-low { background: #EAF3DE; color: #3B6D11; }
.tag-open { background: var(--blue-light); color: var(--blue); }
.tag-done { background: #EAF3DE; color: #3B6D11; }

.restock-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
.restock-row:last-child { border-bottom: none; }
.restock-name { font-size: 13px; font-weight: 500; }
.restock-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.config-notice { background: var(--blue-light); border: 1px solid #B5D4F4; border-radius: var(--radius); padding: 12px 16px; font-size: 12px; color: var(--blue); margin-bottom: 1rem; line-height: 1.6; }
.config-notice a { color: var(--blue); }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1a1f1c; color: white; padding: 10px 18px; border-radius: 30px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.empty { text-align: center; padding: 2.5rem; color: var(--text-faint); font-size: 13px; }

@media (max-width: 640px) {
  .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .form-grid { grid-template-columns: 1fr; }
  .header { padding: 0 1rem; }
  .main { padding: 1rem; }
  .nav { padding: 0 1rem; }
  .nav-btn { padding: 0 12px; font-size: 12px; }
  .inv-table th:nth-child(2), .inv-table td:nth-child(2) { display: none; }
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
//  FerryLab — app.js
//  Otter Ferry Seafish Limited
//  All UI logic, data management, and Google Sheets API calls.
// ═══════════════════════════════════════════════════════════════

// ── DEMO DATA (used when no SCRIPT_URL is configured) ──────────
const DEMO_INVENTORY = [];

const DEMO_WORK_ORDERS = [];

// ── STATE ───────────────────────────────────────────────────────
let inventory    = JSON.parse(JSON.stringify(DEMO_INVENTORY));
let workOrders   = JSON.parse(JSON.stringify(DEMO_WORK_ORDERS));
let restockLog   = [];
let activeCat    = 'All';
let nextItemId   = 11;
let nextWoId     = 4;
let isLive       = false; // true once connected to Google Sheets

// ── INIT ────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  populateUserSelect();
  populateCategorySelects();
  renderFilters();
  renderInventory();
  renderWorkOrders();
  renderAlerts();

  if (CONFIG.SCRIPT_URL) {
    isLive = true;
    const notice = document.getElementById('configNotice');
    if (notice) notice.style.display = 'none';
    loadFromSheets();
  }
});

function populateUserSelect() {
  const sel = document.getElementById('userSelect');
  sel.innerHTML = '<option value="">Select your name...</option>';
  CONFIG.USERS.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u;
    sel.appendChild(opt);
  });
}

function populateCategorySelects() {
  const selects = ['newCat'];
  selects.forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    sel.innerHTML = CONFIG.CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
  });
  const locSel = document.getElementById('newLocation');
  if (locSel) locSel.innerHTML = CONFIG.LOCATIONS.map(l => `<option value="${l}">${l}</option>`).join('');
  const woAssign = document.getElementById('woAssign');
  if (woAssign) {
    woAssign.innerHTML = '<option value="Everyone">Everyone</option>' +
      CONFIG.USERS.map(u => `<option value="${u}">${u}</option>`).join('');
  }
}

function onUserChange() {
  const user = document.getElementById('userSelect').value;
  if (user) showToast(`Welcome, ${user}`);
}

// ── GOOGLE SHEETS API ───────────────────────────────────────────
async function apiCall(action, payload = {}) {
  if (!CONFIG.SCRIPT_URL) return null;
  try {
    const params = new URLSearchParams({ action, ...payload });
    const res = await fetch(`${CONFIG.SCRIPT_URL}?${params}`);
    const json = await res.json();
    return json;
  } catch (e) {
    console.error('API error:', e);
    showToast('Connection error — changes saved locally only');
    return null;
  }
}

async function loadFromSheets() {
  showToast('Loading live data...');
  const data = await apiCall('getAll');
  if (!data) return;
  if (data.inventory)  inventory  = data.inventory;
  if (data.workOrders) workOrders = data.workOrders;
  if (data.restockLog) restockLog = data.restockLog;
  renderInventory();
  renderWorkOrders();
  renderAlerts();
  showToast('Live data loaded');
}

// ── STATUS HELPERS ──────────────────────────────────────────────
function getStatus(item) {
  if (item.qty === 0)            return 'critical';
  if (item.qty <= item.thresh)   return 'low';
  return 'ok';
}

function statusPill(item) {
  const s = getStatus(item);
  if (s === 'critical') return '<span class="pill pill-critical">Critical</span>';
  if (s === 'low')      return '<span class="pill pill-low">Low stock</span>';
  return                       '<span class="pill pill-ok">OK</span>';
}

// ── INVENTORY RENDER ────────────────────────────────────────────
function renderFilters() {
  const cats = ['All', ...CONFIG.CATEGORIES];
  document.getElementById('filterRow').innerHTML = cats.map(c =>
    `<button class="filter-pill ${activeCat === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function renderInventory() {
  const filtered = activeCat === 'All' ? inventory : inventory.filter(i => i.cat === activeCat);
  const sorted   = [...filtered].sort((a, b) => {
    const order = { critical: 0, low: 1, ok: 2 };
    return order[getStatus(a)] - order[getStatus(b)];
  });

  const total  = inventory.length;
  const crit   = inventory.filter(i => getStatus(i) === 'critical').length;
  const low    = inventory.filter(i => getStatus(i) === 'low').length;
  const ok     = total - crit - low;

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Total items</div><div class="metric-val">${total}</div></div>
    <div class="metric"><div class="metric-label">OK</div><div class="metric-val">${ok}</div></div>
    <div class="metric"><div class="metric-label">Low stock</div><div class="metric-val warn">${low}</div></div>
    <div class="metric"><div class="metric-label">Critical / out</div><div class="metric-val danger">${crit}</div></div>
  `;

  document.getElementById('invBody').innerHTML = sorted.length === 0
    ? `<tr><td colspan="5" class="empty">No items in this category</td></tr>`
    : sorted.map(item => `
      <tr>
        <td>
          <div class="item-name">${item.name}</div>
        </td>
        <td><span style="font-size:11px;color:var(--text-muted)">${item.cat}</span></td>
        <td><span style="font-size:11px;color:var(--text-muted)">${item.location || '—'}</span></td>
        <td>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-val">${item.qty}</span>
            <span class="qty-unit">${item.unit}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          </div>
        </td>
        <td>${statusPill(item)}</td>
        <td>
          ${item.restockSent
            ? '<span class="btn btn-restock sent">✓ Requested</span>'
            : `<button class="btn btn-restock" onclick="requestRestock(${item.id})">Request restock</button>`
          }
        </td>
        <td><button class="btn-delete" onclick="deleteItem(${item.id})" title="Delete item">✕</button></td>
      </tr>`).join('');
}

function setFilter(cat) {
  activeCat = cat;
  renderFilters();
  renderInventory();
}

// ── QTY CHANGE ──────────────────────────────────────────────────
async function changeQty(id, delta) {
  const user = document.getElementById('userSelect').value;
  if (!user) { showToast('Please select your name first'); return; }

  const item = inventory.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);

  // Auto-alert check
  const status = getStatus(item);
  if ((status === 'low' || status === 'critical') && !item.autoAlerted) {
    item.autoAlerted = true;
    showToast(`Auto-alert sent: low stock on "${item.name}"`);
    if (isLive) {
      await apiCall('autoAlert', {
        itemName: item.name,
        qty: item.qty,
        thresh: item.thresh,
        unit: item.unit,
        managerEmail: CONFIG.MANAGER_EMAIL,
        updatedBy: user
      });
    }
  }
  if (status === 'ok') item.autoAlerted = false;

  renderInventory();

  if (isLive) {
    await apiCall('updateQty', { id: item.id, qty: item.qty, updatedBy: user });
  }
}

// ── ADD ITEM ────────────────────────────────────────────────────
async function addItem() {
  const user   = document.getElementById('userSelect').value;
  const name     = document.getElementById('newName').value.trim();
  const cat      = document.getElementById('newCat').value;
  const location = document.getElementById('newLocation').value;
  const qty      = parseInt(document.getElementById('newQty').value)    || 0;
  const thresh   = parseInt(document.getElementById('newThresh').value) || 10;
  const unit     = document.getElementById('newUnit').value.trim()      || 'units';

  if (!name)  { showToast('Please enter an item name'); return; }
  if (!user)  { showToast('Please select your name first'); return; }

  const newItem = { id: nextItemId++, name, cat, location, qty, thresh, unit, restockSent: false };
  inventory.push(newItem);

  document.getElementById('newName').value   = '';
  document.getElementById('newQty').value    = '';
  document.getElementById('newThresh').value = '';
  document.getElementById('newUnit').value   = '';
  toggleForm('addItemForm');
  renderInventory();
  showToast(`"${name}" added to inventory`);

  if (isLive) {
    await apiCall('addItem', { name, cat, location, qty, thresh, unit, addedBy: user });
  }
}

// ── DELETE ITEM ─────────────────────────────────────────────────
async function deleteItem(id) {
  const item = inventory.find(i => i.id === id);
  if (!item) return;
  const confirmed = confirm(`Delete "${item.name}" from inventory? This cannot be undone.`);
  if (!confirmed) return;
  inventory = inventory.filter(i => i.id !== id);
  renderInventory();
  showToast(`"${item.name}" deleted`);
  if (isLive) {
    await apiCall('deleteItem', { id });
  }
}

// ── RESTOCK REQUEST ─────────────────────────────────────────────
async function requestRestock(id) {
  const user = document.getElementById('userSelect').value;
  if (!user) { showToast('Please select your name first'); return; }

  const item = inventory.find(i => i.id === id);
  if (!item) return;
  item.restockSent = true;

  const now = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  const entry = { name: item.name, cat: item.cat, by: user, time: `Today at ${now}`, qty: item.qty, unit: item.unit };
  restockLog.push(entry);

  renderInventory();
  renderAlerts();
  showToast(`Restock request sent for "${item.name}"`);

  if (isLive) {
    await apiCall('requestRestock', {
      itemName:     item.name,
      qty:          item.qty,
      unit:         item.unit,
      requestedBy:  user,
      managerEmail: CONFIG.MANAGER_EMAIL
    });
  }
}

// ── WORK ORDERS ─────────────────────────────────────────────────
function renderWorkOrders() {
  const open   = workOrders.filter(w => w.status === 'Open');
  const done   = workOrders.filter(w => w.status === 'Completed');

  document.getElementById('woBadge').textContent = open.length;

  document.getElementById('woList').innerHTML = [...open, ...done].length === 0
    ? '<div class="empty">No work orders yet</div>'
    : [...open, ...done].map(wo => `
      <div class="wo-card ${wo.status === 'Completed' ? 'completed' : ''}">
        <div class="wo-top">
          <div>
            <div class="wo-title">${wo.title}</div>
            <div class="wo-meta">Assigned to ${wo.assigned} &middot; Due ${wo.due} &middot; Created by ${wo.by}</div>
          </div>
          <span class="tag ${wo.status === 'Completed' ? 'tag-done' : 'tag-open'}">${wo.status}</span>
        </div>
        <div class="wo-desc">${wo.desc}</div>
        <div class="wo-footer">
          <div class="wo-tags">
            <span class="tag tag-${wo.priority.toLowerCase()}">${wo.priority} priority</span>
          </div>
          ${wo.status === 'Open'
            ? `<button class="btn btn-complete" onclick="completeWO(${wo.id})">Mark complete</button>`
            : ''}
        </div>
      </div>`).join('');
}

async function addWorkOrder() {
  const user  = document.getElementById('userSelect').value;
  const title = document.getElementById('woTitle').value.trim();
  const assign = document.getElementById('woAssign').value;
  const pri   = document.getElementById('woPriority').value;
  const due   = document.getElementById('woDue').value;
  const desc  = document.getElementById('woDesc').value.trim();

  if (!title) { showToast('Please enter a title'); return; }
  if (!due)   { showToast('Please set a due date'); return; }

  const today = new Date().toISOString().slice(0, 10);
  const wo = { id: nextWoId++, title, assigned: assign, priority: pri, due, desc, status: 'Open', by: user || 'Unknown', created: today };
  workOrders.push(wo);

  document.getElementById('woTitle').value = '';
  document.getElementById('woDesc').value  = '';
  document.getElementById('woDue').value   = '';
  toggleForm('addWOForm');
  renderWorkOrders();
  showToast('Work order created');

  if (isLive) {
    await apiCall('addWorkOrder', { title, assigned: assign, priority: pri, due, desc, createdBy: user || 'Unknown' });
  }
}

async function completeWO(id) {
  const user = document.getElementById('userSelect').value;
  const wo = workOrders.find(w => w.id === id);
  if (!wo) return;
  wo.status = 'Completed';
  renderWorkOrders();
  showToast('Work order marked as complete');

  if (isLive) {
    await apiCall('completeWorkOrder', { id, completedBy: user || 'Unknown' });
  }
}

// ── ALERTS / RESTOCK LOG ────────────────────────────────────────
function renderAlerts() {
  document.getElementById('alertBadge').textContent = restockLog.length;
  document.getElementById('alertList').innerHTML = restockLog.length === 0
    ? '<div class="empty">No restock requests sent yet</div>'
    : [...restockLog].reverse().map((r, i) => {
        const realIndex = restockLog.length - 1 - i;
        return `
      <div class="restock-row">
        <div>
          <div class="restock-name">${r.name}</div>
          <div class="restock-meta">${r.cat} &middot; ${r.qty} ${r.unit} remaining &middot; Requested by ${r.by} &middot; ${r.time}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="tag tag-open">Email sent</span>
          <button class="btn-delete" onclick="deleteRestockEntry(${realIndex})" title="Remove entry">✕</button>
        </div>
      </div>`;
      }).join('');
}

// ── DELETE RESTOCK ENTRY ────────────────────────────────────────
async function deleteRestockEntry(index) {
  const entry = restockLog[index];
  if (!entry) return;
  const confirmed = confirm(`Remove restock request for "${entry.name}"?`);
  if (!confirmed) return;
  restockLog.splice(index, 1);
  renderAlerts();
  showToast('Restock entry removed');
  if (isLive) {
    await apiCall('deleteRestockEntry', { index });
  }
}

// ── UTILITIES ───────────────────────────────────────────────────
function toggleForm(id) {
  document.getElementById(id).classList.toggle('open');
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx = { inventory: 0, workorders: 1, alerts: 2 };
  document.querySelectorAll('.nav-btn')[idx[id]].classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

</script>
</body>
</html>
